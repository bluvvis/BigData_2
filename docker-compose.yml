services:
  cluster-master:
    platform: linux/amd64
    image: firasj/spark-docker-cluster
    container_name: cluster-master
    ports:
      - "8088:8088"
      - "4040:4040"
      - "19888:19888"
      - "9000:9000"
      - "9870:9870"
    volumes:
      - "./app:/app"
    networks:
      - spark-cluster
    depends_on:
      - cluster-slave-1
      - cassandra-server
    hostname: cluster-master
    tty: true
    working_dir: /app
    environment:
      - STAY_ALIVE_AFTER_PIPELINE=${STAY_ALIVE_AFTER_PIPELINE:-0}
    entrypoint: 
      - bash
      - /app/app.sh
    
  cluster-slave-1:
    platform: linux/amd64
    image: firasj/spark-docker-cluster
    container_name: cluster-slave-1
    networks:
      - spark-cluster
    hostname: cluster-slave-1
    tty: true
  cassandra-server:
    image: cassandra
    container_name: cassandra-server
    ports:
      - "7010:7000"
    environment:
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
    mem_limit: 2g
    networks:
      - spark-cluster
    

networks:
  spark-cluster:
    driver: bridge